name: Deploy to GCP VM

on:
  push:
    branches: [main]
  workflow_dispatch: # 수동 실행 가능

jobs:
  deploy:
    name: Deploy Backend and Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCP_SSH_KEY }}

      - name: Add GCP VM to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 34.47.75.181 >> ~/.ssh/known_hosts

      - name: Deploy to GCP VM
        run: |
          ssh sos1253@34.47.75.181 << 'ENDSSH'
            set -e
            echo "📦 Pulling latest code..."
            cd ~/daham_voc
            git pull origin main

            echo "🔨 Building backend..."
            cd ~/daham_voc/backend
            npm install
            npx prisma generate
            npx prisma migrate deploy
            npm run build

            echo "🔨 Building frontend..."
            cd ~/daham_voc/web
            npm install
            npm run build

            echo "🌐 Deploying landing page..."
            sudo mkdir -p /var/www/landing/assets
            sudo cp ~/daham_voc/landing/index.html ~/daham_voc/landing/privacy.html ~/daham_voc/landing/terms.html /var/www/landing/
            sudo cp -r ~/daham_voc/landing/assets/. /var/www/landing/assets/
            sudo chown -R www-data:www-data /var/www/landing

            echo "🔧 Updating nginx config..."
            sudo cp ~/daham_voc/nginx-dahamvoc.conf /etc/nginx/sites-available/dahamvoc
            sudo ln -sf /etc/nginx/sites-available/dahamvoc /etc/nginx/sites-enabled/dahamvoc
            # nginx.conf의 http 블록에 client_max_body_size 추가 (없으면)
            if ! grep -q "client_max_body_size" /etc/nginx/nginx.conf; then
              sudo sed -i '/http {/a\    client_max_body_size 50M;' /etc/nginx/nginx.conf
            fi
            sudo nginx -t && sudo systemctl reload nginx

            echo "🚀 Restarting services with PM2..."
            cd ~/daham_voc
            pm2 delete all 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save

            echo "✅ Checking service status..."
            sleep 5
            pm2 status
          ENDSSH

      - name: Verify Deployment
        run: |
          echo "⏳ Waiting for server to start..."
          sleep 15
          echo "✅ Checking backend health..."
          curl -f https://api.dahamvoc.co.kr/health || exit 1
          
          echo "✅ Checking frontend..."
          curl -f https://admin.dahamvoc.co.kr || exit 1
          
          echo "🎉 Deployment completed successfully!"
